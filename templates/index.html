<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Finance AI</title>

<link rel="manifest" href="/static/manifest.json"/>
<meta name="theme-color" content="#0b1020"/>

<link rel="icon" href="/static/icons/icon-192.png"/>
<link rel="apple-touch-icon" href="/static/icons/icon-192.png"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="/static/css/app.css"/>
</head>

<body>

<div class="wrap">

<div class="topbar">

<div class="brand">
<h1>Finance AI</h1>
<p>Seu assistente financeiro inteligente</p>
</div>

<div class="accountMenuWrap">

<button id="btnAccount" class="iconBtn">☰</button>

<div id="accountDropdown" class="accountDropdown">

<div id="accountEmail" class="accountEmail">
Não conectado
</div>

<div class="row">
<button id="btnLogin" class="btn primary">Entrar</button>
<button id="btnLogout" class="btn danger hidden">Sair</button>
</div>

<button id="btnConta" class="btn small">
Minha conta
</button>

</div>

</div>

</div>

<section class="hero">

<h2 id="helloTitle" class="helloTitle">
Olá 👋
</h2>

<p id="helloSub" class="helloSub">
Resumo financeiro indisponível.
</p>

</section>

<div class="tabs">

<div class="tab" data-tab="lancar">Lançar</div>
<div class="tab" data-tab="ultimos">Últimos</div>
<div class="tab active" data-tab="dashboard">Dashboard</div>
<div class="tab" data-tab="investimentos">Investimentos</div>

</div>

<section id="tab-dashboard">

<div class="card">

<h2>Painel financeiro</h2>

<div class="split">

<div class="field">
<label>Mês</label>
<select id="dashMes"></select>
</div>

<div class="field">
<label>Ano</label>
<input id="dashAno"/>
</div>

</div>

<div class="divider"></div>

<div class="miniCard">

<div class="row">

<div>RECEITAS</div>
<div class="spacer"></div>
<div id="valReceitas">R$ 0,00</div>

</div>

</div>

<div class="miniCard">

<div class="row">

<div>GASTOS</div>
<div class="spacer"></div>
<div id="valGastos">R$ 0,00</div>

</div>

</div>

<div class="miniCard">

<div class="row">

<div>SALDO</div>
<div class="spacer"></div>
<div id="valSaldo">R$ 0,00</div>

</div>

</div>

<button id="btnAtualizarDash" class="btn primary">
Atualizar painel
</button>

</div>

</section>

</div>

<script src="/static/js/app.js"></script>

</body>
</html>
